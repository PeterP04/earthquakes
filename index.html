<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Earthquake Dashboard</title>

<link rel="stylesheet" href="styles.css">

<link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">

<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>

</head>

<body>

<div id="map"></div>

<div id="controls">

<h3>Earthquake Filters</h3>

<label>Minimum Magnitude</label><br>
<input type="range" id="magSlider" min="0" max="8" step="0.5" value="0">
<span id="magValue">0</span>

<br><br>

<label>Days Back</label><br>
<input type="range" id="timeSlider" min="1" max="30" value="30">
<span id="timeValue">30</span>

</div>

<div id="legend">

<b>Magnitude</b>

<div class="legend-item">
<div class="legend-color low"></div>0–2
</div>

<div class="legend-item">
<div class="legend-color mid"></div>2–4
</div>

<div class="legend-item">
<div class="legend-color high"></div>4–6
</div>

<div class="legend-item">
<div class="legend-color extreme"></div>6+
</div>

</div>

<script src="script.js"></script>

</body>
</html>
