<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Earthquake Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="sidebar">

<h2>Earthquake Dashboard</h2>

<label>Minimum Magnitude</label>
<input type="range" id="magSlider" min="0" max="10" step="0.1" value="4">
<span id="magValue">4</span>

<br><br>

<label>Time Range (Hours)</label>
<input type="range" id="timeSlider" min="1" max="720" step="1" value="720">
<span id="timeValue">720</span>

<h3>Legend</h3>

<div class="legend">
<div><span class="dot small"></span> Small</div>
<div><span class="dot medium"></span> Medium</div>
<div><span class="dot large"></span> Large</div>
</div>

</div>

<div id="map"></div>

<script src="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.js"></script>
<script src="script.js"></script>

</body>
</html>
